<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Test results summary card">
    <title>Results Summary</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <main>
        <article>
            <section class="result">
                <h1>Your Result</h1>
                <div class="result__score">
                    <p class="result__score--number">76</p>
                    <p class="result__score--text">of 100</p>
                </div>
                <h2 class="great__result">Great</h2>
                <p class="text__result">You scored higher than 65% of the people who have taken these tests.</p>
            </section>
            <section class="summary">
                <h2>Summary</h2>
                <div class="reaction">
                    <img src="results-summary-component-main/assets/images/icon-reaction.svg" alt="icono de reaccion">
                    <p class="text-reaction">Reaction</p>
                    <p class="score-reaction">80 / 100</p>
                </div>
                <div class="memory">
                    <img src="results-summary-component-main/assets/images/icon-memory.svg" alt="icono de memoria">
                    <p class="text-memory">Memory</p>
                    <p class="score-memory">92 / 100</p>
                </div>
                <div class="verbal">
                    <img src="results-summary-component-main/assets/images/icon-verbal.svg" alt="icono de verbal">
                    <p class="text-verbal">Verbal</p>
                    <p class="score-verbal">61 / 100</p>
                </div>
                <div class="visual">
                    <img src="results-summary-component-main/assets/images/icon-visual.svg" alt="icono de visual">
                    <p class="text-visual">Visual</p>
                    <p class="score-visual">72 / 100</p>
                </div>
                <button>Continue</button>
            </section>
        </article>
    </main>
</body>

</html>
